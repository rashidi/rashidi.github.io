name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - package.json
      - package-lock.json
      - ./docs/modules/ROOT/**
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site with Antora
        run: |
          npm run build
          touch build/site/.nojekyll

      - name: Add CNAME
        run: cp CNAME build/site/CNAME

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./build/site

  deploy:
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
