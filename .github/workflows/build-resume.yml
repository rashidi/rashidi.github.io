name: Compile AsciiDoc Resume to PDF

on:
  push:
    paths:
      - '/docs/modules/ROOT/pages/index.adoc'
      - './github/workflows/resume-theme.yml'
  workflow_dispatch: # Allows manual trigger via GitHub UI

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Puppeteer CLI
        run: npm install -g puppeteer-cli

      # Captures your live site exactly as it is, preserving backgrounds
      - name: Print Live Site to PDF
        run: |
          puppeteer print \
            --format A4 \
            --background \
            https://rashidi.zin.my/ ./resume.pdf

      - name: Verify Output File Presence
        run: |
          if [ ! -f resume.pdf ]; then
            echo "Error: Output resume.pdf was not successfully generated."
            exit 1
          fi

      - name: Upload PDF as Workflow Artifact
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdf-artifact
          path: resume.pdf
          retention-days: 90
