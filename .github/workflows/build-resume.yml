name: Compile AsciiDoc Resume to PDF

on:
  push:
    paths:
      - '/docs/modules/ROOT/pages/index.adoc'
      - './github/workflows/resume-theme.yml'
  workflow_dispatch: # Allows manual trigger via GitHub UI

jobs:
  build-pdf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0' # Not needed with a .ruby-version, .tool-versions or mise.toml
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
          
      - name: Install Asciidoctor and Dependencies
        run: |
          gem install asciidoctor-pdf rouge
          
      - name: Compile PDF via Asciidoctor Docker Container
        run: |
          asciidoctor-pdf --trace -v -B ./ -a pdf-theme=./resume-theme.yml ./docs/modules/ROOT/pages/index.adoc -o resume.pdf

      - name: Verify Output File Presence
        run: |
          if [ ! -f resume.pdf ]; then
            echo "Error: Output resume.pdf was not successfully generated."
            exit 1
          fi

      - name: Upload PDF as Workflow Artifact
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdf-artifact
          path: resume.pdf
          retention-days: 360
