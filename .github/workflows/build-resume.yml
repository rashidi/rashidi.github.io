name: Compile AsciiDoc Resume to PDF

on:
  push:
    paths:
      - '/docs/modules/ROOT/pages/index.adoc'
      - './github/workflows/resume-theme.yml'
  workflow_dispatch: # Allows manual trigger via GitHub UI

jobs:
  build-resume:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      # Install Antora and Puppeteer
      - name: Install Dependencies
        run: |
          npm install -D @antora/cli @antora/site-generator-default puppeteer

      # Generate the static HTML using your default.hbs and index.adoc
      - name: Build Antora Site
        run: npx antora antora-playbook.yml

      # Capture the local HTML file to PDF
      - name: Generate PDF with Puppeteer
        run: |
          cat << 'EOF' > generate.js
          const puppeteer = require('puppeteer');
          const path = require('path');

          (async () => {
            try {
              const browser = await puppeteer.launch({
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              const page = await browser.newPage();
              
              // Point directly to the HTML file Antora just generated
              // Note: Adjust 'build/site/index.html' if your antora-playbook.yml outputs to a different directory
              const filePath = `file://${path.join(__dirname, 'build/site/index.html')}`;
              console.log(`Navigating to ${filePath}`);
              
              await page.goto(filePath, { waitUntil: 'networkidle0' });
              
              // CRITICAL: Emulate 'screen' media so standard print stylesheets 
              // don't hide your side panel or navigation elements.
              await page.emulateMediaType('screen');
              
              await page.pdf({
                path: 'resume.pdf',
                format: 'A4',
                printBackground: true,
                margin: { top: '0', bottom: '0', left: '0', right: '0' }
              });
              
              await browser.close();
              console.log('PDF generated successfully!');
            } catch (error) {
              console.error('Error generating PDF:', error);
              process.exit(1);
            }
          })();
          EOF
          node generate.js

      - name: Verify Output File Presence
        run: |
          if [ ! -f resume.pdf ]; then
            echo "Error: Output resume.pdf was not successfully generated."
            exit 1
          fi

      - name: Upload PDF as Workflow Artifact
        uses: actions/upload-artifact@v7
        with:
          name: resume-pdf-artifact
          path: resume.pdf
          retention-days: 90
